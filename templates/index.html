<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Motivational Quote Generator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #fff;
      padding: 2rem;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 1.5rem;
      padding: 3rem 2.5rem;
      max-width: 560px;
      width: 100%;
      text-align: center;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }

    .subtitle {
      color: rgba(255,255,255,0.55);
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }

    form { display: flex; flex-direction: column; gap: 1rem; }

    input[type="text"] {
      width: 100%;
      padding: 0.85rem 1.1rem;
      border-radius: 0.75rem;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.07);
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]::placeholder { color: rgba(255,255,255,0.35); }
    input[type="text"]:focus { border-color: rgba(255,255,255,0.5); }

    button {
      padding: 0.85rem;
      border-radius: 0.75rem;
      border: none;
      background: #e94560;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.88; }

    .quote-box {
      margin-top: 2rem;
      padding: 1.5rem;
      border-radius: 1rem;
      background: rgba(233, 69, 96, 0.15);
      border: 1px solid rgba(233, 69, 96, 0.35);
      font-size: 1.1rem;
      line-height: 1.65;
      font-style: italic;
    }

    .work-label {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.45);
      margin-top: 1.25rem;
    }

    .error {
      margin-top: 1.5rem;
      color: #ff6b6b;
      font-size: 0.9rem;
    }

    .nav-link {
      display: inline-block;
      margin-top: 2rem;
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }
    .nav-link:hover { color: #fff; }
  </style>
</head>
<body>
  <div class="card">
    <h1>✨ Motivational Quote</h1>
    <p class="subtitle">Tell us what you're working on and get inspired.</p>

    <form method="POST">
      <input
        type="text"
        name="work"
        placeholder="e.g. building a startup, learning guitar, writing my thesis..."
        value="{{ work or '' }}"
        required
        autofocus
      />
      <button type="submit">Get my quote →</button>
    </form>

    {% if quote %}
      <div class="quote-box">{{ quote }}</div>
      <p class="work-label">for: {{ work }}</p>
    {% endif %}

    {% if error %}
      <p class="error">{{ error }}</p>
    {% endif %}

    <a href="/journal" class="nav-link">📓 Try Daily Journal →</a>
  </div>
</body>
</html>
